<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo pedido de proyecto</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 24px;">
    <h2 style="color: #1a1a1a; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px;">
      Nuevo pedido de proyecto
    </h2>

    <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
      <tr>
        <td style="padding: 8px 0; font-weight: bold; width: 140px;">Nombre:</td>
        <td style="padding: 8px 0;">{{name}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; font-weight: bold;">Email:</td>
        <td style="padding: 8px 0;"><a href="mailto:{{email}}">{{email}}</a></td>
      </tr>
      <tr>
        <td style="padding: 8px 0; font-weight: bold;">Tipo de proyecto:</td>
        <td style="padding: 8px 0;">{{projectType}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; font-weight: bold;">Presupuesto:</td>
        <td style="padding: 8px 0;">{{budget}}</td>
      </tr>
    </table>

    <div style="margin-top: 24px;">
      <p style="font-weight: bold; margin-bottom: 8px;">Descripción del proyecto:</p>
      <p style="background: #f5f5f5; padding: 16px; border-radius: 4px; white-space: pre-wrap;">{{description}}</p>
    </div>
  </body>
</html>
