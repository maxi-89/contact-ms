service: contact-ms

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    REGION: ${self:provider.region}
    PENDING_MESSAGES_QUEUE: !Ref PendingMessagesQueue
    EMAIL_SOURCE: ${env:EMAIL_SOURCE, ''}
    DESTINATION_EMAIL: ${env:DESTINATION_EMAIL, ''}
    CLOUDFRONT_DOMAIN: ${env:CLOUDFRONT_DOMAIN, ''}
    RATE_LIMIT_TABLE: !Ref RateLimitTable
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:PutItem
          Resource:
            - !GetAtt RateLimitTable.Arn
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - !GetAtt PendingMessagesQueue.Arn
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt PendingMessagesQueue.Arn
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: '*'

functions:
  authorizer:
    handler: src/presentation/handlers/authorizer.handler

  receiveMessage:
    handler: src/presentation/handlers/receiveMessage.handler
    events:
      - http:
          path: /message
          method: post
          cors: true
          authorizer:
            name: authorizer
            type: REQUEST
            identitySource: method.request.header.origin

  receiveProjectRequest:
    handler: src/presentation/handlers/receiveProjectRequest.handler
    events:
      - http:
          path: /project-request
          method: post
          cors: true
          authorizer:
            name: authorizer
            type: REQUEST
            identitySource: method.request.header.origin

  sendEmail:
    handler: src/presentation/handlers/sendEmail.handler
    events:
      - sqs:
          arn: !GetAtt PendingMessagesQueue.Arn
          batchSize: 1

resources:
  Resources:
    PendingMessagesDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-dlq
        MessageRetentionPeriod: 1209600  # 14 days

    PendingMessagesQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt PendingMessagesDLQ.Arn
          maxReceiveCount: 3

    RateLimitTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-rate-limit
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

plugins:
  - serverless-offline
  - serverless-dynamodb-local

custom:
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
